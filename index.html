<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&I Antojitos | Gourmet & Artesanal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --rosa: #ff85c1; --morado: #9b51e0; --blanco: #ffffff;
            --fondo: #fcfaff; --texto: #2d3436; --card-bg: #ffffff;
            --shadow: rgba(0,0,0,0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --fondo: #1a1a2e; --texto: #e1e1e1; --card-bg: #16213e;
                --blanco: #16213e; --shadow: rgba(0,0,0,0.4);
            }
            p { color: #b2bec3 !important; }
            .producto, .promo-card { background: #1f2a44 !important; border-color: #2d3436 !important; }
            .nombre-prod, .total-num { color: #fff !important; }
            .controles { background: #0f3460 !important; }
            .checkout-bar { background: rgba(22, 33, 62, 0.95) !important; border-color: var(--morado) !important; }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: all 0.2s ease; }
        body { font-family: 'Outfit', sans-serif; margin: 0; background-color: var(--fondo); color: var(--texto); padding-bottom: 140px; overflow-x: hidden; }

        header { 
            background: linear-gradient(135deg, var(--rosa) 0%, var(--morado) 100%); 
            color: white; text-align: center; padding: 4.5rem 1.5rem;
            border-bottom-left-radius: 50px; border-bottom-right-radius: 50px;
        }

        .container { padding: 0 1.2rem; max-width: 550px; margin: -40px auto 0; }
        
        /* BARRA DE PROGRESO INTERACTIVA */
        .progress-container {
            background: var(--card-bg); padding: 15px; border-radius: 20px;
            margin-bottom: 1.5rem; box-shadow: 0 5px 15px var(--shadow);
        }
        .progress-text { font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; display: block; text-align: center; }
        .progress-bg { background: #eee; height: 10px; border-radius: 10px; overflow: hidden; }
        .progress-fill { background: linear-gradient(to right, var(--rosa), var(--morado)); width: 0%; height: 100%; }

        /* FILTROS */
        .filters { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding: 5px 0; }
        .filter-btn { 
            padding: 8px 18px; border-radius: 50px; border: 2px solid var(--morado);
            background: transparent; color: var(--morado); font-weight: 700; font-size: 0.9rem;
            white-space: nowrap; cursor: pointer;
        }
        .filter-btn.active { background: var(--morado); color: white; }

        section { 
            background: var(--card-bg); padding: 2rem; border-radius: 30px; 
            margin-bottom: 1.5rem; box-shadow: 0 10px 40px var(--shadow);
            border: 1px solid rgba(155, 81, 224, 0.1);
        }

        .producto { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: #fff; border: 2px solid rgba(0,0,0,0.03);
            border-radius: 20px; margin-bottom: 12px;
        }
        .producto:active { transform: scale(0.98); }

        .btn-qty { 
            background: var(--morado); border: none; color: white; 
            width: 35px; height: 35px; border-radius: 12px; font-size: 1.3rem;
            cursor: pointer;
        }
        .btn-qty:active { transform: scale(1.2); }

        .checkout-bar {
            position: fixed; bottom: 25px; left: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px);
            padding: 18px 25px; border-radius: 28px; display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12); border: 1px solid var(--rosa); z-index: 1000;
        }

        .btn-ws { 
            background: linear-gradient(135deg, #25d366 0%, #128c7e 100%); 
            color: white; border: none; padding: 14px 24px; border-radius: 20px; font-weight: 700; 
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
        }
        .btn-ws:active { transform: scale(0.95); }
    </style>
</head>
<body>

<header>
    <h1>M&I Antojitos</h1>
    <p>¡Tus bolis favoritos en Coapa! ✨</p>
</header>

<div class="container">
    <div class="progress-container">
        <span class="progress-text" id="progreso-texto">¡Pide 10 bolis para el Paquete Fiesta! 🎉</span>
        <div class="progress-bg"><div class="progress-fill" id="barra-fill"></div></div>
    </div>

    <div class="filters">
        <button class="filter-btn active" onclick="filtrar('todos', this)">🌈 Todos</button>
        <button class="filter-btn" onclick="filtrar('leche', this)">🥛 Leche</button>
        <button class="filter-btn" onclick="filtrar('agua', this)">🌊 Agua</button>
    </div>

    <section id="tienda">
        <div id="lista-productos"></div>
    </section>

    <section>
        <h2>¿Quiénes somos? 👫</h2>
        <p>Somos <strong>Iker y Michelle</strong>. Cada boli es artesanal y hecho con amor. ¡Gracias por apoyarnos!</p>
        <button style="background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%); color: white; width: 100%; padding: 15px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer;" onclick="window.open('https://instagram.com/antojitos_mi', '_blank')">📸 SÍGUENOS EN INSTAGRAM</button>
    </section>
</div>

<div class="checkout-bar">
    <div class="total-info">
        <span class="total-num" id="total-display" style="font-size: 1.5rem; font-weight: 800;">$0</span>
    </div>
    <button class="btn-ws" onclick="enviarPedido()">Confirmar Pedido ➔</button>
</div>

<script>
    const productos = [
        {nombre: "Duvalín 🍦", tipo: "leche", precio: 25},
        {nombre: "Mazapán 🥜", tipo: "leche", precio: 25},
        {nombre: "Oreo 🍪", tipo: "leche", precio: 25},
        {nombre: "Queso Zarzamora 🍰", tipo: "leche", precio: 25},
        {nombre: "Mango Chamoy 🥭", tipo: "agua", precio: 20},
        {nombre: "Skwinkles 🍭", tipo: "agua", precio: 20},
        {nombre: "Jamaica 🌺", tipo: "agua", precio: 20}
    ];

    let carrito = {};
    let filtroActual = 'todos';

    function renderar() {
        const lista = document.getElementById('lista-productos');
        lista.innerHTML = '';
        
        const productosFiltrados = filtroActual === 'todos' ? productos : productos.filter(p => p.tipo === filtroActual);

        productosFiltrados.forEach(p => {
            const cant = carrito[p.nombre] || 0;
            lista.innerHTML += `
                <div class="producto">
                    <div class="info-prod">
                        <span class="nombre-prod" style="font-weight:700;">${p.nombre}</span><br>
                        <span class="precio-prod" style="color:var(--rosa);">$${p.precio}</span>
                    </div>
                    <div class="controles">
                        <button class="btn-qty" onclick="cambiar('${p.nombre}', -1)">-</button>
                        <span class="cant" style="margin: 0 10px; font-weight:800;">${cant}</span>
                        <button class="btn-qty" onclick="cambiar('${p.nombre}', 1)">+</button>
                    </div>
                </div>`;
        });
        actualizarInterfaz();
    }

    function filtrar(tipo, btn) {
        filtroActual = tipo;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderar();
    }

    function cambiar(nombre, delta) {
        carrito[nombre] = (carrito[nombre] || 0) + delta;
        if (carrito[nombre] < 0) carrito[nombre] = 0;
        renderar();
    }

    function actualizarInterfaz() {
        let total = 0;
        let totalPiezas = 0;
        for (let p in carrito) {
            let prod = productos.find(x => x.nombre === p);
            if(prod) {
                total += carrito[p] * prod.precio;
                totalPiezas += carrito[p];
            }
        }

        // Si llega a 10, aplicar descuento de Paquete Fiesta ($20 menos)
        if (totalPiezas >= 10) {
            total -= 20;
            document.getElementById('progreso-texto').innerText = "¡Paquete Fiesta activado! -$20 de descuento ✅";
            document.getElementById('barra-fill').style.width = "100%";
        } else {
            let faltantes = 10 - totalPiezas;
            document.getElementById('progreso-texto').innerText = `¡Faltan ${faltantes} bolis para el descuento Fiesta! 🥳`;
            document.getElementById('barra-fill').style.width = (totalPiezas * 10) + "%";
        }

        document.getElementById('total-display').innerText = `$${total}`;
    }

    function enviarPedido() {
        let pedidoArray = [];
        let total = 0;
        let totalPiezas = 0;

        for (let p in carrito) {
            if (carrito[p] > 0) {
                let prod = productos.find(x => x.nombre === p);
                pedidoArray.push(`• ${carrito[p]} de ${p}`);
                total += carrito[p] * prod.precio;
                totalPiezas += carrito[p];
            }
        }
        
        if (totalPiezas === 0) return alert("¡El carrito está vacío!");
        if (totalPiezas >= 10) total -= 20;

        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

        setTimeout(() => {
            const mensaje = `Hola M&I 👋🏻\nQuisiera este pedido:\n${pedidoArray.join("\n")}\n\nTotal: $${total}\n\n¿Me confirman si tienen disponible? ✨`;
            window.open(`https://wa.me/5580830028?text=${encodeURIComponent(mensaje)}`, '_blank');
        }, 800);
    }

    renderar();
</script>
</body>
</html>
