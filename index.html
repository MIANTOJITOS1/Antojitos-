<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>M&E Antojitos | Gourmet & Artesanal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --rosa: #ff85c1; --morado: #9b51e0; --fondo: #0a0c10;
            --card-bg: #161b22; --texto: #ffffff;
            --spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        html { scroll-behavior: smooth; -webkit-user-select: none; user-select: none; overflow-y: scroll; overscroll-behavior-y: contain; }
        body { font-family: 'Outfit', sans-serif; margin: 0; background-color: var(--fondo); color: var(--texto); padding-bottom: 200px; line-height: 1.5; animation: appEntry 0.6s ease-out; }
        @keyframes appEntry { from { opacity: 0; } to { opacity: 1; } }

        header { background: linear-gradient(180deg, #d6249f 0%, var(--morado) 100%); padding: 5rem 1.5rem 8rem; text-align: center; border-bottom-left-radius: 60px; border-bottom-right-radius: 60px; box-shadow: 0 15px 40px rgba(0,0,0,0.4); position: relative; }
        .slogan-box { text-align: center; padding: 40px 20px; margin-top: -85px; position: relative; z-index: 5; }
        .eslogan { font-family: 'Caveat', cursive; font-size: 2.8rem; color: var(--rosa); line-height: 1; text-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .container { padding: 0 1.2rem; max-width: 480px; margin: 0 auto; }

        /* Estilo para la sección de Promociones */
        .promo-section {
            background: linear-gradient(135deg, rgba(155, 81, 224, 0.2), rgba(255, 133, 193, 0.1));
            border: 2px solid var(--morado); padding: 20px; border-radius: 30px; margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(155, 81, 224, 0.2);
        }

        .categoria-label { font-size: 1.1rem; font-weight: 900; margin: 40px 0 20px; color: var(--rosa); letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.8; padding-left: 5px; }

        .producto { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; background: var(--card-bg); border-radius: 25px; margin-bottom: 12px; border: 1px solid transparent; transition: 0.2s ease; }
        .producto.active { border-color: rgba(255,133,193,0.3); background: #1c232d; }
        .producto.promo { background: #1e152e; border: 1px solid var(--rosa); }

        .controles { display: flex; align-items: center; gap: 8px; }
        .btn-qty { background: #2d3436; border: none; color: white; width: 44px; height: 44px; border-radius: 16px; font-size: 1.5rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.1s active, background 0.2s; }
        .btn-qty.plus { background: var(--morado); }
        .btn-qty:active { transform: scale(0.9); opacity: 0.8; }
        .cant { width: 30px; text-align: center; font-weight: 900; font-size: 1.2rem; }

        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 12, 16, 0.85); padding: 20px 25px 40px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 1000; }
        .total-val { font-size: 2.2rem; font-weight: 900; color: #fff; }
        .total-label { font-size: 0.75rem; color: var(--rosa); font-weight: 800; letter-spacing: 1px; }

        .btn-ws { background: #25d366; color: white; border: none; padding: 18px 30px; border-radius: 22px; font-weight: 900; font-size: 1rem; box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3); cursor: pointer; transition: 0.3s var(--spring); }
        .btn-ws:active { transform: scale(0.95); }

        .dot { position: fixed; width: 2px; height: 2px; background: white; border-radius: 50%; opacity: 0.2; pointer-events: none; z-index: -1; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size:3.5rem; font-weight:900; letter-spacing:-3px;">M&E</h1>
</header>

<div class="slogan-box">
    <p class="eslogan">"Amor en cada bocado."</p>
</div>

<div class="container">
    <div class="categoria-label">🎉 Promociones Especiales</div>
    <div id="lista-promos"></div>

    <div class="categoria-label">🥛 Cremosos</div>
    <div id="lista-leche"></div>

    <div class="categoria-label">🍓 Frutales</div>
    <div id="lista-agua"></div>
</div>

<div class="footer-bar">
    <div class="total-info">
        <span class="total-label" id="label-piezas">TU CARRITO ESTÁ VACÍO</span>
        <span class="total-val" id="total-val">$0</span>
    </div>
    <button class="btn-ws" onclick="enviarPedido()">PEDIR ➔</button>
</div>

<script>
    // Lista de productos actualizada con el Paquete Fiesta
    const productos = [
        {n: "Paquete Fiesta (10 Bolis Surtidos) 🥳", t: "promo", p: 230},
        {n: "Duvalín 🍦", t: "leche", p: 25},
        {n: "Mazapán 🥜", t: "leche", p: 25},
        {n: "Oreo 🍪", t: "leche", p: 25},
        {n: "Queso Zarzamora 🍰", t: "leche", p: 25},
        {n: "Mango Chamoy 🥭", t: "agua", p: 20},
        {n: "Skwinkles 🍭", t: "agua", p: 20},
        {n: "Jamaica con Chamoy 🌺", t: "agua", p: 20},
        {n: "Jamaica Natural 🌸", t: "agua", p: 20}
    ];

    let carrito = {};

    function render() {
        const dP = document.getElementById('lista-promos');
        const dL = document.getElementById('lista-leche');
        const dA = document.getElementById('lista-agua');
        dP.innerHTML = ''; dL.innerHTML = ''; dA.innerHTML = '';

        productos.forEach(p => {
            const c = carrito[p.n] || 0;
            const html = `
                <div class="producto ${p.t === 'promo' ? 'promo' : ''} ${c > 0 ? 'active' : ''}">
                    <div style="flex:1">
                        <div style="font-weight:700; font-size:1.1rem">${p.n}</div>
                        <div style="color:#777; font-size:0.9rem">$${p.p} MXN</div>
                    </div>
                    <div class="controles">
                        <button class="btn-qty" onclick="update('${p.n}', -1)">-</button>
                        <span class="cant">${c}</span>
                        <button class="btn-qty plus" onclick="update('${p.n}', 1)">+</button>
                    </div>
                </div>`;
            
            if (p.t === 'promo') dP.innerHTML += html;
            else if (p.t === 'leche') dL.innerHTML += html;
            else dA.innerHTML += html;
        });
        updateUI();
    }

    function update(n, d) {
        carrito[n] = (carrito[n] || 0) + d;
        if (carrito[n] < 0) carrito[n] = 0;
        
        if(d > 0) {
            const val = document.getElementById('total-val');
            val.style.transform = "scale(1.1)";
            setTimeout(() => val.style.transform = "scale(1)", 100);
        }
        render();
    }

    function updateUI() {
        let t = 0, pz = 0;
        for (let n in carrito) {
            let p = productos.find(x => x.n === n);
            t += (carrito[n] * p.p);
            pz += carrito[n];
        }

        const lab = document.getElementById('label-piezas');
        
        if (pz === 0) {
            lab.innerText = "TU CARRITO ESTÁ VACÍO";
        } else {
            lab.innerText = `${pz} PRODUCTO(S) SELECCIONADO(S)`;
        }
        
        document.getElementById('total-val').innerText = `$${t}`;
    }

    function enviarPedido() {
        let items = [], t = 0, pz = 0;
        for (let n in carrito) {
            if (carrito[n] > 0) {
                let p = productos.find(x => x.n === n);
                items.push(`• ${carrito[n]} x ${p.n}`);
                t += (carrito[n] * p.p);
                pz += carrito[n];
            }
        }
        if (pz === 0) return alert("¡Agrega algo a tu carrito!");

        confetti({ 
            particleCount: 100, spread: 60, origin: { y: 0.85 },
            colors: ['#ff85c1', '#9b51e0']
        });
        
        setTimeout(() => {
            const msg = `¡Hola M&E! 🍦 Quiero este pedido:\n${items.join("\n")}\n\nTotal: $${t}\n¿Me confirman disponibilidad?`;
            window.open(`https://wa.me/5580830028?text=${encodeURIComponent(msg)}`, '_blank');
        }, 600);
    }

    render();
</script>
</body>
</html>
